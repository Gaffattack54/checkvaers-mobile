<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Solid cyan background, padded so the glyph reads at small sizes. -->
  <rect width="512" height="512" rx="96" fill="#29C5F6"/>

  <!-- Subtle hex pattern overlay -->
  <g fill="none" stroke="#0B1B3B" stroke-opacity="0.08" stroke-width="2">
    <path d="M120 100l40 23v46l-40 23-40-23v-46z"/>
    <path d="M392 100l40 23v46l-40 23-40-23v-46z"/>
    <path d="M120 320l40 23v46l-40 23-40-23v-46z"/>
    <path d="M392 320l40 23v46l-40 23-40-23v-46z"/>
  </g>

  <!-- Shield body -->
  <path
    d="M256 64 l128 56 v120 c0 96 -56 168 -128 208 c-72 -40 -128 -112 -128 -208 v-120 z"
    fill="#0B1B3B"
  />

  <!-- Inner shield highlight -->
  <path
    d="M256 96 l96 42 v100 c0 76 -44 132 -96 168 c-52 -36 -96 -92 -96 -168 v-100 z"
    fill="#142A56"
  />

  <!-- Checkmark -->
